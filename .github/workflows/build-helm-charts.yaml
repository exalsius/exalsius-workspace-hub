name: "Build and push helm charts"

# Publishes each chart to OCI IMMUTABLY: a version already present in
# the registry is never overwritten — only new versions are pushed. release-please
# owns the version bumps, so a normal commit (no bump) re-runs this as a no-op,
# and a merged release PR (bumped Chart.yaml) publishes the new version. After a
# new version is published, its exalsius/ manifests are rendered into the manifests
# tree (manifests/ + examples/) and committed back to main.

on:
  push:
    branches:
      - main
    paths:
      - "workspace-templates/**"
      - ".github/workflows/build-helm-charts.yaml"
      - "scripts/render-workspace-manifests.sh"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install YQ
        uses: mikefarah/yq@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package, push (immutable), and render manifests
        run: |
          set -euo pipefail
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          repo="oci://ghcr.io/${repo_lower}/charts"

          charts=$(find workspace-templates -name "Chart.yaml" -type f | sed 's|/Chart.yaml||' | sort)
          if [ -z "$charts" ]; then
            echo "No charts found under workspace-templates/ (no Chart.yaml files)."
            exit 1
          fi

          published_any=false

          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            chart_yaml="$dir/Chart.yaml"
            name=$(yq '.name' "$chart_yaml")
            version=$(yq '.version' "$chart_yaml")

            # Immutability guard: never overwrite an already-published version.
            if helm show chart "$repo/$name" --version "$version" >/dev/null 2>&1; then
              echo "skip: $name $version already published (immutable)"
              continue
            fi

            echo "::group::Publishing $name $version"

            # Resolve dependencies the same way as the test workflow.
            yq '.dependencies | ( . // [] ) | filter(.repository | test("^https?://"))
              | map("helm repo add " + .name + " " + .repository)[]' "$chart_yaml" | sh || true
            if yq '.dependencies | ( . // [] ) | length > 0' "$chart_yaml" | grep -q '^true$'; then
              if [ -d "$dir/charts" ] && [ -n "$(ls -A "$dir/charts" 2>/dev/null)" ]; then
                echo "Using vendored dependencies in $dir/charts."
              elif [ -f "$dir/Chart.lock" ]; then
                helm dependency build "$dir"
              else
                helm dependency update "$dir"
              fi
            fi

            helm package "$dir" --version "$version" --app-version "$version"
            helm push "$name-$version.tgz" "$repo"
            rm -f "$name-$version.tgz"

            # Render the version-pinned operator CRs (no-op if no exalsius/).
            scripts/render-workspace-manifests.sh "$dir"
            published_any=true
            echo "::endgroup::"
          done <<< "$charts"

          echo "PUBLISHED_ANY=$published_any" >> "$GITHUB_ENV"

      - name: Commit rendered manifests back to main
        if: env.PUBLISHED_ANY == 'true'
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain manifests examples)" ]; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests examples
          git commit -m "chore: render workspace manifests [skip ci]"
          git push

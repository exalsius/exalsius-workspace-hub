name: "Build and push helm charts"

# Publishes each chart to OCI IMMUTABLY: a version already present in
# the registry is never overwritten — only new versions are pushed. release-please
# owns the version bumps, so a normal commit (no bump) re-runs this as a no-op,
# and a merged release PR (bumped Chart.yaml) publishes the new version. After a
# new version is published, its exalsius/ manifests are rendered into the manifests
# tree (manifests/ + examples/) and committed back to main.

on:
  push:
    branches:
      - main
    paths:
      - "workspace-templates/**"
      - ".github/workflows/build-helm-charts.yaml"
      - "scripts/render-workspace-manifests.sh"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install YQ
        uses: mikefarah/yq@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package, push (immutable), and render manifests
        run: |
          set -euo pipefail
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          repo="oci://ghcr.io/${repo_lower}/charts"

          charts=$(find workspace-templates -name "Chart.yaml" -type f | sed 's|/Chart.yaml||' | sort)
          if [ -z "$charts" ]; then
            echo "No charts found under workspace-templates/ (no Chart.yaml files)."
            exit 1
          fi

          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            chart_yaml="$dir/Chart.yaml"
            name=$(yq '.name' "$chart_yaml")
            version=$(yq '.version' "$chart_yaml")

            # Immutability guard: only publish a version that is not yet in the
            # registry. Rendering below is unconditional (idempotent), so a chart
            # that was published on an earlier run but whose manifests never made
            # it back to main is self-healed on the next run.
            if helm show chart "$repo/$name" --version "$version" >/dev/null 2>&1; then
              echo "skip publish: $name $version already published (immutable)"
            else
              echo "::group::Publishing $name $version"

              # Resolve dependencies the same way as the test workflow.
              yq '.dependencies | ( . // [] ) | filter(.repository | test("^https?://"))
                | map("helm repo add " + .name + " " + .repository)[]' "$chart_yaml" | sh || true
              if yq '.dependencies | ( . // [] ) | length > 0' "$chart_yaml" | grep -q '^true$'; then
                if [ -d "$dir/charts" ] && [ -n "$(ls -A "$dir/charts" 2>/dev/null)" ]; then
                  echo "Using vendored dependencies in $dir/charts."
                elif [ -f "$dir/Chart.lock" ]; then
                  helm dependency build "$dir"
                else
                  helm dependency update "$dir"
                fi
              fi

              helm package "$dir" --version "$version" --app-version "$version"
              helm push "$name-$version.tgz" "$repo"
              rm -f "$name-$version.tgz"
              echo "::endgroup::"
            fi

            # Render the version-pinned operator CRs (no-op if no exalsius/).
            # Runs regardless of publish state; the PR step no-ops if nothing changed.
            scripts/render-workspace-manifests.sh "$dir"
          done <<< "$charts"

      # Branch protection forbids direct pushes to main, so the rendered
      # manifests are proposed via a PR that is left open for manual review and
      # merge. The PAT (not the default GITHUB_TOKEN) is required so the org
      # policy blocking Actions from creating PRs does not apply.
      # create-pull-request commits only the manifests/ + examples/ changes onto
      # a dedicated branch, and no-ops when there is nothing to render.
      - name: Open PR with rendered manifests
        id: render_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PR_TOKEN }}
          add-paths: |
            manifests
            examples
          branch: chore/render-workspace-manifests
          delete-branch: true
          commit-message: "chore: render workspace manifests"
          title: "chore: render workspace manifests"
          body: |
            Automated render of version-pinned workspace manifests following a chart publish.

            This PR is generated by the `Build and push helm charts` workflow.
            Review and merge it to publish the rendered manifests to main.

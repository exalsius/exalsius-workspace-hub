name: "Build and push helm charts"

on:
  push:
    branches:
      - feat/build_oci_charts
    paths:
      - "workspace-templates/**"
      - ".github/workflows/build-helm-charts.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        # Only a single commit is fetched by default, not whole tree.

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install YQ
        uses: mikefarah/yq@v4

      - name: Build charts
        run: |
          mkdir build
          charts=$(find workspace-templates -name "Chart.yaml" -type f | sed 's|/Chart.yaml||' | jq -R -s -c 'split("\n")[:-1]')
          if [ "$(echo "$charts" | jq 'length')" -eq 0 ]; then
            echo "No charts found under workspace-templates/ (no Chart.yaml files)."
            exit 1
          fi

          echo "Found charts:"
          echo "$charts" | jq -r '.[]'

          echo "$charts" | jq -r '.[]' | while IFS= read -r dir
          do
            chart_yaml="$dir/Chart.yaml"

            yq '.dependencies
              | ( . // [] )
              | filter(.repository | test("^https?://"))
              | map("helm repo add " + .name + " " + .repository)[]' "$chart_yaml" | sh
            helm dependency update "$dir"

            version=$(yq .version "$chart_yaml")-${{ github.sha }}
            helm package "$dir" --version "$version" --app-version "$version"
            chart_name=$(yq .name "$chart_yaml")
            mv "$chart_name-$version.tgz" build/
          done
          echo
          echo "Built:"
          ls build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          repo=oci://ghcr.io/${repo_lower}/charts
          for chart in build/*
          do
            echo
            echo "Pushing $chart to $repo"
            helm push "$chart" "$repo"
          done
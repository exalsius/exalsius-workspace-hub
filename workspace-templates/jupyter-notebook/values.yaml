# jupyter-notebook workspace chart values
#
# The image is selected by the operator-injected GPU vendor (docs/adr/0003):
# `default` is framework-free for CPU + NVIDIA (install CUDA PyTorch via pip);
# `amd` is ROCm-baked because the ROCm userspace can't be injected at runtime.
# When deployed via the exalsius operator, resources, GPU placement, the GPU
# resource name, and the GPU vendor are injected under `_exalsius.*` and override
# the `fallback.*` values below. The fallbacks exist only so a plain
# `helm install` works for chart authoring.

image:
  pullPolicy: IfNotPresent
  # Each variant is pinned by DIGEST, decoupled from the chart version
  # (docs/adr/0001) — `tag` is a label only. A WorkspaceDeployment may override
  # either variant.
  default:
    repository: ghcr.io/exalsius/jupyter-notebook
    tag: "latest"
    digest: "sha256:3cc00486c5e0fc4daee55a4ff97d8b1cf01634380be1252cf5eea388a2935823"
  amd:
    repository: ghcr.io/exalsius/jupyter-notebook
    tag: "latest-rocm"
    digest: "sha256:ff429de9a44a7572e7b4b3e076b29cf106cf11500d12b45415204b7d82e3d70b"

# Password for the Jupyter web UI. The operator sets this from the
# WorkspaceClass userFacingConfig (type=secret).
notebookPassword: "changeme"

service:
  # Service port exposed as the "http" AccessEndpoint; targetPort is the
  # notebook container port (8888). ClusterIP only — routing is operator-owned.
  port: 80

gpu:
  nvidia:
    # Applied as the pod runtimeClassName ONLY when the operator-injected GPU
    # vendor is NVIDIA. Set to "" when the NVIDIA runtime is already the node's
    # default runtime (GPU Operator default) — pinning a non-existent
    # RuntimeClass makes the pod fail admission. Never applied for AMD/CPU.
    runtimeClassName: "nvidia"

# Fallback resources used ONLY for a plain `helm install`. The operator injects
# `_exalsius.resources.perReplica.*`, which override these.
fallback:
  cpu: "2"
  memory: "4Gi"
  storage: "10Gi"

# Operator-injected contract — DO NOT set by hand. Shown (commented) for
# reference and local testing; see values-{nvidia,amd,cpu}.yaml for examples.
# _exalsius:
#   resources:
#     replicas: 1
#     perReplica:
#       cpu: "16"
#       memory: "32Gi"
#       storage: "50Gi"
#       gpuCount: 1
#       gpuVendor: "NVIDIA"          # or "AMD"
#       gpuResourceName: "nvidia.com/gpu"
#   scheduling:
#     nodeSelector:
#       nvidia.com/gpu.product: "NVIDIA-L40"
_exalsius: {}

apiVersion: v1
kind: ConfigMap
metadata:
  # Hashed name so body-based routing (in llm-d-infra) reconciles — BBR keys an
  # internal cache on configmap names. The bbr-managed label is how the infra
  # model-registry discovers this model for Open WebUI.
  name: '{{ .Release.Name }}-cm-{{ include "modelService.configMapHash" . }}'
  labels:
    inference.networking.k8s.io/bbr-managed: "true"
data:
  baseModel: {{ .Values.ms.modelArtifacts.name }}

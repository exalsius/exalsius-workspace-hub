apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ms.modelArtifacts.authSecretName }}
data:
{{- if .Values.huggingfaceToken }}
  HF_TOKEN: {{ .Values.huggingfaceToken | b64enc }}
{{- end }}
{{- if .Values.inferenceApiKey }}
---
# Dedicated secret consumed by the gateway's apiKeyAuthentication policy (see
# networking.yaml). Kept separate from the model-auth secret above because
# agentgateway treats EVERY entry in the referenced secret as a valid API key —
# mixing HF_TOKEN in here would make it a usable inference key. Each entry is one
# accepted key; the entry name is an arbitrary identifier.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-external-apikey
stringData:
  api-key: {{ .Values.inferenceApiKey | quote }}
{{- end }}

{{- /*
Per-model inference gateway. Each llm-d-model workspace runs its OWN istio
Gateway in its own namespace (rather than attaching to a single shared infra
gateway), so the model's OpenAI endpoint is backed by an in-namespace Service —
which is what the operator's routing federates (provider.go ensureMirrorService
labels a Service in the workspace namespace as an Istio ambient global service).

The name is fixed (`llm-d-inference-gateway`); it is unambiguous because each
workspace runs in its own namespace. istio auto-provisions a Service named
`llm-d-inference-gateway-istio`, which the WorkspaceClass references as the
`llm-inference` AccessEndpoint's serviceName (see exalsius/workspaceclass.yaml).
*/ -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-inference-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: llm-d-inference-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    gateway-role: llm-inference
spec:
  gatewayClassName: {{ .Values.gatewayClassName | default "istio" }}
  listeners:
    - name: llm-inference
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

apiVersion: v2
name: llm-d-model
description: >-
  Serves one LLM for inference with the llm-d stack (GAIE InferencePool +
  llm-d-modelservice/vLLM). Attaches to the shared agentgateway from llm-d-infra
  and exposes a per-workspace OpenAI-compatible endpoint. Requires the
  llm-d-infra prerequisite (auto-installed by the operator).
type: application
version: 0.2.0
# appVersion tracks the upstream llm-d stack version this chart pins
# (kept deliberately; scoped exception to ADR-0001 — see docs/adr/0002).
appVersion: 0.6.0

dependencies:
  # 1) GAIE inference pool
  - name: inferencepool
    alias: ip
    version: "v1.4.0"
    repository: "oci://registry.k8s.io/gateway-api-inference-extension/charts"
  # 2) modelservice
  - name: llm-d-modelservice
    alias: ms
    version: "v0.4.9"
    repository: "https://llm-d-incubation.github.io/llm-d-modelservice"

# Example WorkspaceDeployment (admin intent — deploy the shared infra directly).
#
# TEMPLATE — rendered at release time into
#   examples/llm-d-infra/${VERSION}/example-workspacedeployment.yaml
# Placeholders ${VERSION} / ${VERSION_DASHED} are substituted from Chart.yaml.
#
# Usually unnecessary — the operator auto-installs llm-d-infra as the
# llm-d-model prerequisite. Deploy this only to stand up the shared Open WebUI
# endpoint explicitly (and then do NOT also rely on prerequisite auto-install on
# the same cluster; see exalsius/workspaceclass.yaml).
apiVersion: workspaces.exalsius.ai/v1
kind: WorkspaceDeployment
metadata:
  name: llm-infra
  namespace: kcm-system
spec:
  workspaceClassRef: llm-d-infra-${VERSION_DASHED}
  clusterDeploymentRef:
    name: default-child-adopted          # Colony "default" + cluster "child-adopted"
    namespace: kcm-system
  resources:
    perReplica:
      cpu: "2"
      memory: "4Gi"
      storage: "5Gi"
      gpuCount: 0

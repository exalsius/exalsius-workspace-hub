apiVersion: v2
name: llm-d-infra
description: >-
  Shared llm-d inference infrastructure (agentgateway, model discovery, Open
  WebUI). Auto-installed once per cluster as the llm-d-model prerequisite, and
  exposes Open WebUI via its own WorkspaceClass.
type: application
version: 0.3.0
appVersion: 0.6.0
dependencies:
  - name: agentgateway
    version: v1.0.0
    repository: oci://cr.agentgateway.dev/charts
  - name: llm-d-infra
    alias: infra
    version: v1.4.0
    repository: https://llm-d-incubation.github.io/llm-d-infra
  - name: open-webui
    alias: ow
    version: 13.0.1
    repository: https://helm.openwebui.com/

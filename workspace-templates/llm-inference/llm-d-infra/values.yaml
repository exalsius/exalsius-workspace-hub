modelRegistry:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/astral-sh/uv
    tag: python3.12-bookworm-slim
    pullPolicy: IfNotPresent
  configMapLabel:
    key: inference.networking.k8s.io/bbr-managed
    value: "true"
  modelsDataKey: baseModel
  pollIntervalSec: "30"
  pollBackoffMaxSec: "300"
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

agentgateway:
  inferenceExtension:
    enabled: true

infra:
  gateway:
    enabled: true
    provider: agentgateway
    gatewayClassName: agentgateway
    fullnameOverride: llm-d-inference-gateway
    listeners:
      # This "external" listener is for workspaces and their services, attached via HTTPRoutes
      - name: external
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: All
      # This "internal" listener is for open-webui
      - name: internal
        port: 8080
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: All
    service:
      # ClusterIP — routing is operator-owned (no NodePort). NOTE: with the
      # per-model gateway design (docs/adr/0002), whether this shared gateway is
      # still needed and how Open WebUI reaches per-model gateways is a flagged
      # follow-up to validate against the dev harness.
      type: ClusterIP

ow:
  # nameOverride makes the Open WebUI Service "<release>-open-webui", matching
  # the "open-webui" AccessEndpoint convention in exalsius/workspaceclass.yaml.
  nameOverride: open-webui
  enableOpenaiApi: true
  openaiBaseApiUrl: http://llm-d-inference-gateway.llm-d.svc.cluster.local:8080/v1
  image:
    pullPolicy: Always
  ollama:
    enabled: false
  pipelines:
    enabled: false
  tika:
    enabled: false
  websocket:
    enabled: false
modelRegistry:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/astral-sh/uv
    tag: python3.12-bookworm-slim
    pullPolicy: IfNotPresent
  configMapLabel:
    key: inference.networking.k8s.io/bbr-managed
    value: "true"
  modelsDataKey: baseModel
  pollIntervalSec: "30"
  pollBackoffMaxSec: "300"
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

agentgateway:
  inferenceExtension:
    enabled: true

infra:
  gateway:
    enabled: true
    provider: agentgateway
    gatewayClassName: agentgateway
    fullnameOverride: llm-d-inference-gateway
    listeners:
      # This "external" listener is for workspaces and their services, attached via HTTPRoutes
      - name: external
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: All
      # This "internal" listener is for open-webui
      - name: internal
        port: 8080
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: All
      # This "webui" listener fronts Open WebUI. Each llm-d-model's "chat" endpoint
      # redirects here (not straight to the Open WebUI Service): the operator's
      # per-model redirect rides the ambient waypoint, which can only reach
      # mesh-native upstreams like this gateway — not a plain app Service in the
      # non-ambient default namespace. The gateway then hops to Open WebUI. Kept
      # separate from external/internal so UI traffic never touches BBR or the
      # model routes. See docs/adr/0006.
      - name: webui
        port: 8081
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: All
    service:
      # ClusterIP — routing is operator-owned (no NodePort). This is the single
      # shared gateway every llm-d-model attaches to; Open WebUI reaches it via
      # the internal listener (:8080) and models via the external listener (:80).
      # See docs/adr/0002.
      type: ClusterIP

ow:
  # fullnameOverride pins the Open WebUI Service to a fixed, release-independent
  # name (mirroring the gateway's llm-d-inference-gateway) so each llm-d-model can
  # target it cross-namespace as the backend of its "chat" redirect route. infra is
  # a pure prerequisite and no longer owns a WorkspaceClass/AccessEndpoint, so the
  # old release-relative "<release>-open-webui" naming is gone (see docs/adr/0006).
  fullnameOverride: llm-d-open-webui
  enableOpenaiApi: true
  openaiBaseApiUrl: http://llm-d-inference-gateway:8080/v1
  image:
    pullPolicy: Always
  ollama:
    enabled: false
  pipelines:
    enabled: false
  tika:
    enabled: false
  websocket:
    enabled: false
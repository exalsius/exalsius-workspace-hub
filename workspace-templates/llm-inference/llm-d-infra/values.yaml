modelRegistry:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/astral-sh/uv
    tag: python3.12-bookworm-slim
    pullPolicy: IfNotPresent
  configMapLabel:
    key: inference.networking.k8s.io/bbr-managed
    value: "true"
  modelsDataKey: baseModel
  pollIntervalSec: "30"
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

infra:
  gateway:
    enabled: true
    gatewayClassName: istio
    fullnameOverride: llm-d-inference-gateway
    listeners:
      - name: llm-inference
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: All
    service:
      # ClusterIP — routing is operator-owned (no NodePort). NOTE: with the
      # per-model gateway design (docs/adr/0002), whether this shared gateway is
      # still needed and how Open WebUI reaches per-model gateways is a flagged
      # follow-up to validate against the dev harness.
      type: ClusterIP
    labels:
      gateway-role: llm-inference

bbr:
  bbr:
    # Makes it possible to watch for configmaps across namespaces
    multiNamespace: true
    plugins:
      - type: body-field-to-header
        name: model-extractor
        json: {"field_name":"model","header_name":"X-Gateway-Base-Model-Name"}
  provider:
    name: istio
    istio:
      # Apply EnvoyFilter only to the inference gateway (must match gateway pod labels)
      workloadSelector:
        gateway-role: llm-inference
  inferenceGateway:
    name: llm-d-inference-gateway

ow:
  # nameOverride makes the Open WebUI Service "<release>-open-webui", matching
  # the "open-webui" AccessEndpoint convention in exalsius/workspaceclass.yaml.
  nameOverride: open-webui
  enableOpenaiApi: true
  # TODO(flagged follow-up, docs/adr/0002): with per-model gateways, this shared
  # base URL (and its hardcoded namespace) no longer reflects how Open WebUI
  # should reach each model's gateway. Resolve against the dev harness.
  openaiBaseApiUrl: http://llm-d-inference-gateway-istio.llm-d.svc.cluster.local:80/v1
  image:
    pullPolicy: Always
  ollama:
    enabled: false
  pipelines:
    enabled: false
  tika:
    enabled: false
  websocket:
    enabled: false

owgateway:
  gatewayClassName: istio
  listeners:
    - name: open-webui
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
  labels:
    gateway-role: open-webui
  annotations:
    # ClusterIP — routing is operator-owned (no NodePort).
    networking.istio.io/service-type: ClusterIP
{{- /*
Resources and GPU placement are read from the operator-injected `_exalsius`
contract when present (always, when deployed via the workspace operator) and
fall back to chart-local defaults otherwise so plain `helm install` works.

  - _exalsius.resources.perReplica.{cpu,memory}      -> container requests/limits
  - _exalsius.resources.perReplica.{gpuResourceName,gpuCount} -> GPU request (count>0)
  - _exalsius.resources.perReplica.gpuVendor         -> selects NVIDIA runtimeClass
  - _exalsius.scheduling.nodeSelector                -> pod nodeSelector (verbatim)

The chart hardcodes no GPU label key or vendor resource name. A marimo notebook
is single-instance, so replicas are pinned to 1 regardless of the injected
replica count.
*/ -}}
{{- $exalsius := .Values._exalsius | default dict -}}
{{- $exPer := (($exalsius.resources | default dict).perReplica) | default dict -}}
{{- $cpu := $exPer.cpu | default .Values.fallback.cpu -}}
{{- $memory := $exPer.memory | default .Values.fallback.memory -}}
{{- $nodeSelector := (($exalsius.scheduling | default dict).nodeSelector) | default dict -}}
{{- $gpuResource := $exPer.gpuResourceName | default "" -}}
{{- $gpuCount := $exPer.gpuCount | default 0 -}}
{{- $gpuVendor := $exPer.gpuVendor | default "" -}}
{{- $wantGPU := and (ne $gpuResource "") (gt (int $gpuCount) 0) -}}
{{- $runtimeClass := "" -}}
{{- if and $wantGPU (eq (lower (toString $gpuVendor)) "nvidia") -}}
{{- $runtimeClass = .Values.gpu.nvidia.runtimeClassName -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "marimo.labels" . | nindent 4 }}
    {{- include "marimo.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "marimo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "marimo.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        # Run as root group so marimo can write to the PVC, and (on AMD) access
        # the ROCm /dev/kfd and /dev/dri devices that the AMD GPU device plugin
        # attaches when amd.com/gpu is requested.
        fsGroup: 0
      {{- if $runtimeClass }}
      runtimeClassName: {{ $runtimeClass }}
      {{- end }}
      {{- if $nodeSelector }}
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: marimo
          image: {{ include "marimo.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /workspace
          env:
            # Consumed by the image entrypoint, which injects it as marimo's
            # --token-password. Do NOT re-add a `command:` override here — that
            # bypasses the entrypoint's drop to the 'dev' user and the persistent
            # /workspace/.venv setup (marimo would run as root with ephemeral installs).
            - name: TOKEN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: TOKEN_PASSWORD
          # Overrides only the image CMD (subcommand + host/port); the entrypoint
          # appends --token/--token-password and launches marimo from the venv.
          args: ["edit", "--host=0.0.0.0", "--port=8080"]
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /workspace
          resources:
            requests:
              cpu: {{ $cpu | quote }}
              memory: {{ $memory | quote }}
              {{- if $wantGPU }}
              {{ $gpuResource }}: {{ $gpuCount }}
              {{- end }}
            limits:
              cpu: {{ $cpu | quote }}
              memory: {{ $memory | quote }}
              {{- if $wantGPU }}
              {{ $gpuResource }}: {{ $gpuCount }}
              {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}

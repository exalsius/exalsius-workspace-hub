apiVersion: v1
kind: Service
metadata:
  # Named "<release>-ssh" to match the workspace routing convention
  # (<release-name>-<endpoint-name>) for the "ssh" AccessEndpoint declared on the
  # WorkspaceClass. SSH is raw TCP, so the operator routes it via a port-pool
  # TCPRoute (no hostname). ClusterIP only — no NodePort.
  name: {{ .Release.Name }}-ssh
  labels:
    {{- include "devpod.labels" . | nindent 4 }}
    {{- include "devpod.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: ssh
      port: {{ .Values.service.port }}
      targetPort: ssh
  selector:
    {{- include "devpod.selectorLabels" . | nindent 4 }}

{{- /*
Resources and GPU placement are read from the operator-injected `_exalsius`
contract when present (always, when deployed via the workspace operator) and
fall back to chart-local defaults otherwise so plain `helm install` works.

  - _exalsius.resources.perReplica.{cpu,memory}      -> container requests/limits
  - _exalsius.resources.perReplica.{gpuResourceName,gpuCount} -> GPU request (count>0)
  - _exalsius.resources.perReplica.gpuVendor         -> selects NVIDIA runtimeClass
  - _exalsius.scheduling.nodeSelector                -> pod nodeSelector (verbatim)

The chart hardcodes no GPU label key or vendor resource name. A devpod is a
single-user environment, so replicas are pinned to 1 regardless of the injected
replica count.
*/ -}}
{{- $exalsius := .Values._exalsius | default dict -}}
{{- $exPer := (($exalsius.resources | default dict).perReplica) | default dict -}}
{{- $cpu := $exPer.cpu | default .Values.fallback.cpu -}}
{{- $memory := $exPer.memory | default .Values.fallback.memory -}}
{{- $nodeSelector := (($exalsius.scheduling | default dict).nodeSelector) | default dict -}}
{{- $gpuResource := $exPer.gpuResourceName | default "" -}}
{{- $gpuCount := $exPer.gpuCount | default 0 -}}
{{- $gpuVendor := $exPer.gpuVendor | default "" -}}
{{- $wantGPU := and (ne $gpuResource "") (gt (int $gpuCount) 0) -}}
{{- $runtimeClass := "" -}}
{{- if and $wantGPU (eq (lower (toString $gpuVendor)) "nvidia") -}}
{{- $runtimeClass = .Values.gpu.nvidia.runtimeClassName -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "devpod.labels" . | nindent 4 }}
    {{- include "devpod.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "devpod.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devpod.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        # Run as root group so the devpod can write to the PVC, and (on AMD)
        # access the ROCm /dev/kfd and /dev/dri devices that the AMD GPU device
        # plugin attaches when amd.com/gpu is requested.
        fsGroup: 0
      {{- if $runtimeClass }}
      runtimeClassName: {{ $runtimeClass }}
      {{- end }}
      {{- if $nodeSelector }}
      nodeSelector:
        {{- toYaml $nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: devpod
          image: {{ include "devpod.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: ssh
              containerPort: 22
          env:
            {{- if .Values.sshPassword }}
            - name: DEV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: SSH_PASSWORD
            {{- end }}
            {{- if .Values.sshPublicKey }}
            - name: DEV_SSH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: SSH_PUBLIC_KEY
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /workspace
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: {{ $cpu | quote }}
              memory: {{ $memory | quote }}
              {{- if $wantGPU }}
              {{ $gpuResource }}: {{ $gpuCount }}
              {{- end }}
            limits:
              cpu: {{ $cpu | quote }}
              memory: {{ $memory | quote }}
              {{- if $wantGPU }}
              {{ $gpuResource }}: {{ $gpuCount }}
              {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSizeGb }}Gi
